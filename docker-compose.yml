services:
  postgres:
    image: postgres:16-alpine
    container_name: pichanga-postgres
    environment:
      POSTGRES_USER: pichanga
      POSTGRES_PASSWORD: pichanga
      POSTGRES_DB: pichanga
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pichanga -d pichanga"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pichanga-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pichanga-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pichanga:pichanga@postgres:5432/pichanga?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
